<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zero-Trust Service Mesh Demo</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel" aria-labelledby="page-title">
      <p class="eyebrow">Istio traffic path: frontend to backend</p>
      <h1 id="page-title">Zero-Trust Service Mesh Demo</h1>

      <div class="actions">
        <button id="call-backend" type="button">Call Backend</button>
        <span id="status" role="status" aria-live="polite">Ready</span>
      </div>

      <section class="response" aria-labelledby="response-title">
        <h2 id="response-title">Backend Response:</h2>
        <pre id="backend-response">Click the button to call /api/message.</pre>
      </section>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
